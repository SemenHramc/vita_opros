services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vita_opros
      POSTGRES_USER: vita
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vita -d vita_opros"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://vita:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vita_opros
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://vita:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vita_opros
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "bot/healthcheck.py", "${REDIS_URL:-redis://redis:6379/0}", "${DATABASE_URL:-postgresql+asyncpg://vita:changeme@postgres:5432/vita_opros}"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://vita:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vita_opros
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data: